server:
  port: 9910

spring:
  application:
    name: target-service

logging:
  file:
    name: ${TARGET_SERVICE_LOG_FILE:logs/target-service.log}
  pattern:
    dateformat: yyyy-MM-dd'T'HH:mm:ss.SSSXXX,Asia/Shanghai
  level:
    root: INFO
    com.example.targetservice: DEBUG

target-service:
  traceback-log-dir: ${TARGET_SERVICE_TRACEBACK_LOG_DIR:logs/tracebacks}
