server:
  port: 9901

spring:
  profiles:
    include: local
  config:
    import: optional:classpath:application-local.yml
  application:
    name: agent-platform
  jackson:
    serialization:
      write-dates-as-timestamps: false

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${DASHSCOPE_BASE_URL:}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

repair:
  workspace-root: ${REPAIR_WORKSPACE_ROOT:${user.dir}}
  target-project:
    name: target-service
    root-path: ${REPAIR_TARGET_ROOT:target-service}
    log-path: ${REPAIR_TARGET_LOG:target-service/logs}
    test-command: ${REPAIR_TEST_COMMAND:mvn -pl target-service test}
  workflow:
    max-repair-attempts: ${REPAIR_MAX_ATTEMPTS:3}
    process-timeout-seconds: ${REPAIR_PROCESS_TIMEOUT_SECONDS:120}
  git:
    enabled: ${REPAIR_GIT_ENABLED:false}
    remote: ${REPAIR_GIT_REMOTE:origin}
    base-branch: ${REPAIR_BASE_BRANCH:main}
  github:
    enabled: ${REPAIR_GITHUB_ENABLED:false}
  feishu:
    enabled: ${FEISHU_ENABLED:false}
    webhook-url: ${FEISHU_WEBHOOK_URL:}
  llm:
    enabled: ${REPAIR_LLM_ENABLED:true}
    provider: ${REPAIR_LLM_PROVIDER:openai}
    temperature: ${REPAIR_LLM_TEMPERATURE:0.1}
    max-tokens: ${REPAIR_LLM_MAX_TOKENS:4096}
    timeout-seconds: ${REPAIR_LLM_TIMEOUT_SECONDS:180}
    max-retries: ${REPAIR_LLM_MAX_RETRIES:1}
  agentic:
    max-supervisor-invocations: ${REPAIR_AGENTIC_MAX_SUPERVISOR_INVOCATIONS:24}
